<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Tally Demo | Pocket Solver Garden</title>
    <meta
      name="description"
      content="Basic Tally-style voucher extraction from OCR text with a deterministic runtime or a tiny local transformer."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="runtime-page">
    <main class="page-shell single-demo-shell">
      <section class="single-demo-grid" aria-label="tally demo">
        <article class="panel panel-coral">
          <div class="playground">
            <div class="board-column">
              <div id="tally-status" class="status-card"></div>

              <section class="mini-card tally-source-card">
                <p class="mini-label">Input</p>
                <label class="field-label" for="tally-preset">Samples</label>
                <select id="tally-preset" class="field-input field-select">
                  <option value="custom">Bring your own</option>
                </select>
                <p id="tally-preset-description" class="field-hint"></p>

                <label class="field-label" for="tally-format">Input format</label>
                <select id="tally-format" class="field-input field-select">
                  <option value="auto">Auto detect</option>
                  <option value="text">OCR text</option>
                  <option value="tsv">pdftotext TSV</option>
                </select>

                <label class="field-label" for="tally-engine">Engine</label>
                <select id="tally-engine" class="field-input field-select">
                  <option value="teacher">Runtime</option>
                  <option value="model">Local model</option>
                </select>

                <label class="field-label" for="tally-input">Paste OCR text or TSV</label>
                <textarea
                  id="tally-input"
                  class="field-input field-textarea tally-input"
                  spellcheck="false"
                  rows="18"
                ></textarea>

                <label class="field-label" for="tally-file">Load OCR text / TSV</label>
                <input
                  id="tally-file"
                  class="field-input receipt-file-input"
                  type="file"
                  accept=".txt,.tsv,.log,.json,.pdf"
                >

                <div class="control-row">
                  <button id="tally-run" class="button button-primary" type="button">
                    Extract
                  </button>
                  <button id="tally-clear" class="button button-secondary" type="button">
                    Clear
                  </button>
                </div>

                <p class="field-hint">
                  PDF conversion is not supported in this demo. Paste OCR text or `pdftotext -tsv` output instead.
                </p>
              </section>
            </div>

            <div class="inspector-column">
              <section class="mini-card">
                <p class="mini-label">Summary</p>
                <div id="tally-stats" class="stats-grid"></div>
              </section>

              <section class="mini-card">
                <p class="mini-label">Extracted Fields</p>
                <ol id="tally-selected-fields" class="trace-list trace-list-scroll"></ol>
              </section>

              <section class="mini-card">
                <p class="mini-label">Record JSON</p>
                <pre id="tally-record" class="code-block code-block-trace tally-json"></pre>
              </section>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script type="module" src="tally/app.mjs"></script>
  </body>
</html>
